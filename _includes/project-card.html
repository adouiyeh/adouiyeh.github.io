<div class="project-card">
  <h3>{{ project.name }}</h3>
  <p>{{ project.description }}</p>
  <ul class="tech-stack">
    {% for tag in project.tags %}
      <li>{{ tag }}</li>
    {% endfor %}
  </ul>
  {% if project.live_url %}<a href="{{ project.live_url }}" target="_blank">Live Demo</a>{% endif %}
  {% if project.source_url %}<a href="{{ project.source_url }}" target="_blank">Source Code</a>{% endif %}
</div>
