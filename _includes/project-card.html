<article class="project-card card">
  <h3>{{ include.project.name }}</h3>
  <p>{{ include.project.description }}</p>
  <div class="tag-list">
    {% for tag in include.project.tags %}
      <span class="tag-pill">{{ tag }}</span>
    {% endfor %}
  </div>
  <div class="project-links">
    {% if include.project.live_url %}<a href="{{ include.project.live_url }}" target="_blank" rel="noopener">Live</a>{% endif %}
    {% if include.project.source_url %}<a href="{{ include.project.source_url }}" target="_blank" rel="noopener">Source</a>{% endif %}
  </div>
</article>
