---
layout: default
---
<article class="post-card">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.author %} · by {{ page.author }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  {% if page.tags %}
    <div class="post-tags">
      <strong>Tags:</strong>
      {% for tag in page.tags %}
        <span class="tag-pill">{{ tag }}</span>
      {% endfor %}
    </div>
  {% endif %}
  <p><a href="{{ '/pages/blog.html' | relative_url }}">← Back to blog</a></p>
</article>
