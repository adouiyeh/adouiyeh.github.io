title: "Your Name's Personal Site"
description: "A personal blog and portfolio site."
author: "Your Name"
url: "https://adouiyeh.github.io" # The base hostname & protocol for your site
baseurl: "" # The subpath of your site, e.g. /blog
permalink: /blog/:year/:month/:day/:title/

# Social links
social:
  twitter: your-twitter-handle
  github: your-github-handle
  linkedin: your-linkedin-profile
  email: your-email@example.com

# Build settings
markdown: kramdown
theme: minima # Using a default theme for now, will override with custom layouts

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate # Or jekyll-paginate-v2 if supported and preferred

# Pagination settings
paginate: 5
paginate_path: "/blog/page:num/"

collections:
  projects:
    output: true
    permalink: /portfolio/:name/