---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }} {% if page.author %}by {{ page.author }}{% endif %}</p>
  <div class="post-content">
    {{ content }}
  </div>
  {% if page.tags %}
    <div class="post-tags">
      Tags: {% for tag in page.tags %}<a href="/tags/{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}{% endfor %}
    </div>
  {% endif %}
  <a href="{{ 	hreshold-limit_data/pages/blog.html\" | relative_url }}">Back to Blog</a>
</article>
